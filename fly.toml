# fly.toml app configuration file generated for corsair-fly on 2026-04-27T02:36:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'corsair-fly'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  CONTROL_PORT = '8080'
  NODE_ENV = 'production'
  RUNTIME_PORT = '3000'
  WORKSPACE_DEFAULTS_DIR = '/workspace-defaults'
  WORKSPACE_DIR = '/workspace'

[[mounts]]
  source = 'corsair_workspace'
  destination = '/workspace'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
