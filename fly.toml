app = "corsair-claude"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  NODE_ENV          = "production"
  CONTROL_PORT      = "8080"
  RUNTIME_PORT      = "3000"
  WORKSPACE_DIR     = "/workspace"
  WORKSPACE_DEFAULTS_DIR = "/workspace-defaults"

# Persistent volume — stores installed plugins, node_modules, and generated corsair.ts.
# Survives deploys and restarts. Only destroyed if you explicitly delete it.
[mounts]
  source      = "corsair_workspace"
  destination = "/workspace"

# Secrets (set once by deploy.sh, never committed):
#   PUBLIC_URL      https://<your-app>.fly.dev
#   APP_PASSWORD    your dashboard password
#   SESSION_SECRET  openssl rand -hex 32
#   DATABASE_URL    auto-set by fly postgres attach
#   CORSAIR_KEK     openssl rand -base64 32
#   CONTROL_API_KEY openssl rand -hex 32

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
